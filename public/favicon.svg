<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#111111"/>
  <!-- Lens rim left -->
  <circle cx="11" cy="16" r="7" stroke="#E8E8E8" stroke-width="1.5" fill="none"/>
  <!-- Lens rim right -->
  <circle cx="21" cy="16" r="7" stroke="#E8E8E8" stroke-width="1.5" fill="none"/>
  <!-- Bridge -->
  <line x1="18" y1="16" x2="14" y2="16" stroke="#E8E8E8" stroke-width="1.5"/>
  <!-- Temple left -->
  <line x1="4" y1="16" x2="4" y2="14" stroke="#E8E8E8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Temple right -->
  <line x1="28" y1="16" x2="28" y2="14" stroke="#E8E8E8" stroke-width="1.5" stroke-linecap="round"/>
</svg>
